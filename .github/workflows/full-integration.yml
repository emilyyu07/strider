name: Full Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-test:
    name: Integration Test with Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create .env file for backend
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=postgresql://strider_user:strider_password@postgres:5432/strider
          OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
          OLLAMA_MODEL=qwen2.5:1.5b
          EOF
      
      - name: Build and start services
        run: |
          docker compose up -d postgres backend
          sleep 10
      
      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done'
      
      - name: Check backend health
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/health 2>/dev/null; do sleep 2; done'
      
      - name: Run backend integration tests
        run: |
          docker compose exec -T backend pytest -v
      
      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs
      
      - name: Tear down services
        if: always()
        run: |
          docker compose down -v
