services:
  postgres:
    image: pgrouting/pgrouting:16-3.5-4.0
    container_name: strider-db
    environment:
      POSTGRES_DB: strider
      POSTGRES_USER: strider_user
      POSTGRES_PASSWORD: strider_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql
      - ./backend/scripts/install_pgrouting.sql:/docker-entrypoint-initdb.d/02_pgrouting.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strider_user -d strider"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - strider-network

  adminer:
    image: adminer:latest
    container_name: strider-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - strider-network

  backend:
    build:
        context: ./backend
        dockerfile: Dockerfile
    container_name: strider-backend
    environment:
      DATABASE_URL: postgresql://strider_user:strider_password@postgres:5432/strider
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      OLLAMA_MODEL: llama3.2:3b
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - strider-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  graph-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: strider-graph-init
    profiles: ["manual"]
    environment:
      DATABASE_URL: postgresql://strider_user:strider_password@postgres:5432/strider
      OVERPASS_URL: https://overpass-api.de/api/interpreter
      OVERPASS_CENTER_LAT: 43.5448
      OVERPASS_CENTER_LNG: -80.2482
      OVERPASS_RADIUS_M: 6000
      ROUTING_MIN_COMPONENT_NODES: 200
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - strider-network
    command: python scripts/ingest_pipeline.py

volumes:
  postgres_data:
    driver: local

networks:
  strider-network:
    driver: bridge
